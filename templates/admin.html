<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Supersmash Saturdays</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {} }
    }
  </script>
  <style>
    body { background-color: #111827; color: #f3f4f6; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    .score-input {
      width: 52px; text-align: center; background: #1f2937;
      border: 1px solid #374151; border-radius: 6px;
      color: #f3f4f6; padding: 4px 6px; font-size: 16px;
    }
    .score-input:focus { outline: none; border-color: #4ade80; }
    .saved-flash { animation: flashGreen 0.6s ease-out; }
    @keyframes flashGreen {
      0% { background-color: rgba(74, 222, 128, 0.2); }
      100% { background-color: transparent; }
    }
    .tab-btn.active { background: #16a34a; color: white; }
    .tab-btn { transition: background 0.15s; }
  </style>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100">

  <!-- Header -->
  <header class="bg-gray-800 border-b border-green-900/50 sticky top-0 z-20 shadow-lg">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-black text-green-400">🏸 Supersmash Admin</h1>
        <p class="text-xs text-gray-400">Score Entry Panel</p>
      </div>
      <button id="publishBtn"
        class="bg-green-600 hover:bg-green-500 active:bg-green-700 text-white font-bold px-4 py-2 rounded-lg text-sm transition-colors shadow-lg">
        Publish
      </button>
    </div>
  </header>

  <!-- Publish status -->
  <div id="publishStatus" class="hidden max-w-2xl mx-auto px-4 pt-3">
    <div id="publishMsg" class="rounded-lg px-4 py-3 text-sm font-medium"></div>
  </div>

  <main class="max-w-2xl mx-auto px-4 py-4">

    <!-- Tab navigation -->
    <div class="flex gap-2 mb-5 bg-gray-800 p-1 rounded-xl">
      <button class="tab-btn active flex-1 py-2 rounded-lg text-sm font-semibold text-gray-300" data-tab="advanced">Advanced</button>
      <button class="tab-btn flex-1 py-2 rounded-lg text-sm font-semibold text-gray-300" data-tab="intermediate">Intermediate</button>
      <button class="tab-btn flex-1 py-2 rounded-lg text-sm font-semibold text-gray-300" data-tab="beginner">Beginner</button>
      <button class="tab-btn flex-1 py-2 rounded-lg text-sm font-semibold text-gray-300" data-tab="teams">Teams</button>
    </div>

    <!-- Advanced Tab -->
    <div id="tab-advanced" class="tab-content">
      <h2 class="text-xl font-bold text-green-400 mb-4">Advanced Matches</h2>
      <div id="matches-A"></div>
    </div>

    <!-- Intermediate Tab -->
    <div id="tab-intermediate" class="tab-content hidden">
      <h2 class="text-xl font-bold text-blue-400 mb-4">Intermediate Matches</h2>
      <div id="matches-B"></div>
    </div>

    <!-- Beginner Tab -->
    <div id="tab-beginner" class="tab-content hidden">
      <h2 class="text-xl font-bold text-yellow-400 mb-4">Beginner Matches</h2>
      <div id="matches-C"></div>
    </div>

    <!-- Teams Tab -->
    <div id="tab-teams" class="tab-content hidden">
      <h2 class="text-xl font-bold text-gray-200 mb-4">Cross-Skill Teams</h2>
      <div id="teams-list"></div>
    </div>

  </main>

  <script>
    // ─── Data from server ───────────────────────────────────────
    const DATA = {{ data | tojson }};
    const GROUP_KEYS = { advanced: 'A', intermediate: 'B', beginner: 'C' };
    const GROUP_LABELS = { A: 'Advanced', B: 'Intermediate', C: 'Beginner' };
    const PAIR_COLORS = { A: 'green', B: 'blue', C: 'yellow' };

    // ─── Tab switching ──────────────────────────────────────────
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
      });
    });

    // ─── Pair name helper ───────────────────────────────────────
    function pairName(pairObj) {
      return pairObj.players[0] + ' & ' + pairObj.players[1];
    }

    // ─── Score save ─────────────────────────────────────────────
    function saveScore(group, roundIdx, matchIdx, s1, s2, rowEl) {
      fetch('/api/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ group, round: roundIdx, match: matchIdx, score1: s1, score2: s2 })
      })
      .then(r => r.json())
      .then(res => {
        if (res.ok && rowEl) {
          rowEl.classList.remove('saved-flash');
          void rowEl.offsetWidth;
          rowEl.classList.add('saved-flash');
        }
      });
    }

    // ─── Render matches for a group ─────────────────────────────
    function renderMatches(groupKey, containerId) {
      const gd = DATA.groups[groupKey];
      if (!gd) return;
      const pairs = gd.pairs;
      const rounds = gd.rounds;
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      rounds.forEach((round, rIdx) => {
        const allPlayed = round.every(m => m.score1 !== null && m.score2 !== null);
        const anyUnplayed = round.some(m => m.score1 === null || m.score2 === null);
        const isCurrent = !allPlayed;

        const roundDiv = document.createElement('div');
        roundDiv.className = 'mb-5';

        const headerClass = isCurrent ? 'text-green-300 font-bold' : 'text-gray-500 font-semibold';
        const currentBadge = isCurrent ? '<span class="ml-2 text-xs bg-green-700 text-white px-2 py-0.5 rounded-full">Current</span>' : '';
        roundDiv.innerHTML = `<h3 class="${headerClass} text-sm mb-2">Round ${rIdx + 1}${currentBadge}</h3>`;

        round.forEach((match, mIdx) => {
          const p1 = pairs[match.pair1];
          const p2 = pairs[match.pair2];
          const n1 = pairName(p1);
          const n2 = pairName(p2);
          const t1 = p1.team ? `<span class="text-xs text-gray-500">(${p1.team})</span>` : '';
          const t2 = p2.team ? `<span class="text-xs text-gray-500">(${p2.team})</span>` : '';

          const isLive = isCurrent && (match.score1 === null || match.score2 === null);
          const bgClass = isLive ? 'bg-green-900/20 border border-green-800/40' : 'bg-gray-800/60 border border-gray-700/40';

          const row = document.createElement('div');
          row.className = `${bgClass} rounded-xl p-3 mb-2 transition-colors`;
          row.dataset.group = groupKey;
          row.dataset.round = rIdx;
          row.dataset.match = mIdx;

          row.innerHTML = `
            <div class="flex items-start justify-between gap-2">
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium text-gray-200 truncate">${n1} ${t1}</div>
                <div class="text-xs text-gray-500 mt-0.5">vs</div>
                <div class="text-sm font-medium text-gray-200 truncate">${n2} ${t2}</div>
              </div>
              <div class="flex flex-col items-center gap-1 shrink-0">
                <input
                  type="number" min="0" max="99"
                  class="score-input"
                  value="${match.score1 !== null ? match.score1 : ''}"
                  placeholder="—"
                  data-side="1"
                />
                <input
                  type="number" min="0" max="99"
                  class="score-input"
                  value="${match.score2 !== null ? match.score2 : ''}"
                  placeholder="—"
                  data-side="2"
                />
              </div>
            </div>`;

          // Save on blur/change
          row.querySelectorAll('.score-input').forEach(input => {
            const save = () => {
              const inputs = row.querySelectorAll('.score-input');
              const v1 = inputs[0].value.trim();
              const v2 = inputs[1].value.trim();
              saveScore(groupKey, rIdx, mIdx, v1, v2, row);
            };
            input.addEventListener('blur', save);
            input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); save(); e.target.blur(); } });
          });

          roundDiv.appendChild(row);
        });

        container.appendChild(roundDiv);
      });
    }

    // ─── Render teams ───────────────────────────────────────────
    function renderTeams() {
      const container = document.getElementById('teams-list');
      container.innerHTML = '';
      DATA.teams.forEach((team, idx) => {
        const div = document.createElement('div');
        div.className = 'bg-gray-800 rounded-xl p-4 mb-3 border border-gray-700';
        div.innerHTML = `
          <div class="flex items-center gap-2 mb-3">
            <input
              type="text"
              class="bg-gray-700 border border-gray-600 rounded-lg px-3 py-1.5 text-green-300 font-bold text-base flex-1 focus:outline-none focus:border-green-500"
              value="${team.name}"
              data-idx="${idx}"
            />
            <button class="save-team-btn bg-green-700 hover:bg-green-600 text-white text-xs px-3 py-1.5 rounded-lg font-medium transition-colors" data-idx="${idx}">Save</button>
          </div>
          <div class="space-y-1 text-sm">
            <div class="flex items-center gap-2">
              <span class="text-xs bg-green-700/40 text-green-300 px-2 py-0.5 rounded w-24 text-center">Advanced</span>
              <span class="text-gray-300">${team.A[0]} &amp; ${team.A[1]}</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs bg-blue-700/40 text-blue-300 px-2 py-0.5 rounded w-24 text-center">Intermediate</span>
              <span class="text-gray-300">${team.B[0]} &amp; ${team.B[1]}</span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs bg-yellow-700/40 text-yellow-300 px-2 py-0.5 rounded w-24 text-center">Beginner</span>
              <span class="text-gray-300">${team.C[0]} &amp; ${team.C[1]}</span>
            </div>
          </div>`;
        container.appendChild(div);
      });

      container.querySelectorAll('.save-team-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          const input = container.querySelector(`input[data-idx="${idx}"]`);
          const newName = input.value.trim();
          if (!newName) return;
          fetch('/api/team_name', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ index: idx, name: newName })
          })
          .then(r => r.json())
          .then(res => {
            if (res.ok) {
              DATA.teams[idx].name = newName;
              btn.textContent = 'Saved ✓';
              btn.classList.add('bg-gray-600');
              btn.classList.remove('bg-green-700', 'hover:bg-green-600');
              setTimeout(() => {
                btn.textContent = 'Save';
                btn.classList.remove('bg-gray-600');
                btn.classList.add('bg-green-700', 'hover:bg-green-600');
              }, 1500);
            }
          });
        });
      });
    }

    // ─── Publish button ─────────────────────────────────────────
    document.getElementById('publishBtn').addEventListener('click', () => {
      const btn = document.getElementById('publishBtn');
      btn.disabled = true;
      btn.textContent = 'Publishing…';

      const statusDiv = document.getElementById('publishStatus');
      const msgDiv = document.getElementById('publishMsg');
      statusDiv.classList.remove('hidden');
      msgDiv.className = 'rounded-lg px-4 py-3 text-sm font-medium bg-gray-700 text-gray-300';
      msgDiv.textContent = 'Pushing to GitHub Pages…';

      fetch('/api/publish', { method: 'POST' })
        .then(r => r.json())
        .then(res => {
          if (res.ok) {
            msgDiv.className = 'rounded-lg px-4 py-3 text-sm font-medium bg-green-900/50 text-green-300 border border-green-800';
            msgDiv.textContent = '✓ Published to GitHub Pages';
          } else {
            msgDiv.className = 'rounded-lg px-4 py-3 text-sm font-medium bg-red-900/50 text-red-300 border border-red-800';
            msgDiv.textContent = 'Errors: ' + (res.errors || []).join('; ');
          }
          btn.disabled = false;
          btn.textContent = 'Publish';
          setTimeout(() => statusDiv.classList.add('hidden'), 5000);
        })
        .catch(err => {
          msgDiv.className = 'rounded-lg px-4 py-3 text-sm font-medium bg-red-900/50 text-red-300 border border-red-800';
          msgDiv.textContent = 'Network error: ' + err.message;
          btn.disabled = false;
          btn.textContent = 'Publish';
        });
    });

    // ─── Init ───────────────────────────────────────────────────
    renderMatches('A', 'matches-A');
    renderMatches('B', 'matches-B');
    renderMatches('C', 'matches-C');
    renderTeams();
  </script>
</body>
</html>
